services:
  server:
    image: ghcr.io/swaeami/tierlist:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8087:8087"
    environment:
      ADDR: "0.0.0.0:8087"
      DATA_DIR: "/data"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      CORS_ALLOWED_ORIGIN: "${CORS_ALLOWED_ORIGIN}"
    volumes:
      - ./runtime:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8087/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
